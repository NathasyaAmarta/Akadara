<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akadara</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- AOS Animation -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo" data-aos="zoom-in" data-aos-duration="1500">
                Akadara
            </div>

            <div class="links">
                <div class="link active" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="100">
                    <a href="index.html">Home</a>
                </div>
                <div class="link" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="200">
                    <a href="about.html">About Us</a>
                </div>
                <div class="link" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="300">
                    <a href="skill.html">Members</a>
                </div>
                <div class="link" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="500">
                    <a href="contact.html">Contact</a>
                </div>
            </div>
        </div>

        <!-- Hamburger -->
        <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>

        <!-- Dropdown -->
        <div class="dropdown">
            <div class="links">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="skill.html">Members</a>
                <a href="contact.html">Contact</a>
                <i class="fa-solid fa-xmark cancel" onclick="cancel()"></i>
            </div>
        </div>
    </nav>

    <!-- Main Hero Section -->
    <section>
        <div class="main-container">
            <!-- Left Text -->
            <div class="content">
                <h1 data-aos="fade-left" data-aos-duration="1500" data-aos-delay="700">
                    Akadara
                </h1>

                <div class="typewriter" data-aos="fade-right" data-aos-duration="1500" data-aos-delay="900">
                    Your news is a mail away, <span>stay tuned!</span><label>|</label>
                </div>

                <p data-aos="flip-down" data-aos-duration="1500" data-aos-delay="1100">
                    Welcome to Akadara, your trusted source for updates, stories, 
                    and meaningful news delivered straight to your inbox.
                </p>

                <div class="btn" data-aos="zoom-out" data-aos-duration="1500" data-aos-delay="1800">
                    <a href="about.html">
                        <button>About Us</button>
                    </a>
                </div>
            </div>

            <!-- Right Image -->
            <div class="image" data-aos="zoom-in" data-aos-duration="3000">
                <img src="bg.jpg" alt="Akadara Banner">
            </div>
        </div>
    </section>

    <!-- AOS Script -->
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({
            offset: 0
        });
    </script>

    <!-- JS -->
    <script src="script.js"></script>
</body>
</html>
