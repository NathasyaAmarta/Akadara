<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"
    <title>Akadara</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <style>

        /* TAMBAHAN PENGATUR LAPISAN AGAR DROPDOWN BISA DIPENCET */

        nav {

            position: relative !important;

            z-index: 9999999 !important; /* Menaikkan lapisan navbar ke paling depan */

        }



        /* FONT PLAYFAIR DISPLAY */

        nav, 

        .logo, 

        .links a, 

        .dropbtn, 

        .nav-dropdown-content a, 

        .dropdown .links a,

        .content h1,

        .typewriter,

        .content p,

        .btn button {

            font-family: 'Playfair Display', Georgia, serif !important;

        }



        /* Memaksa semua menu rata tengah horizontal secara vertikal */

        .links {

            display: flex !important;

            align-items: center !important; 

            gap: 25px; 

        }



        /* STRUKTUR DROPDOWN UTAMA (ANTI-BUG SAMA DENGAN ABOUT US) */

        .nav-dropdown-wrapper { 

            position: relative; 

            display: inline-block; 

        }



        .nav-dropdown-wrapper .dropbtn { 

            cursor: pointer; 

            display: inline-flex;

            align-items: center;

            padding: 15px 0 !important; 

            color: white;

            text-decoration: none;

        }



        .nav-dropdown-wrapper .dropbtn i { 

            margin-left: 5px; 

            font-size: 0.8rem; 

            transition: transform 0.3s; 

        }

        .nav-dropdown-wrapper:hover .dropbtn i { 

            transform: rotate(180deg); 

        }



        /* Kotak Dropdown Utama - Menempel Rapat 0px Tanpa Celah */

        .nav-dropdown-content {

            display: none !important; 

            position: absolute; 

            background-color: rgba(18, 18, 18, 0.98) !important;

            backdrop-filter: blur(10px); 

            min-width: 200px; 

            top: 100% !important; 

            left: 50%;

            transform: translateX(-50%); 

            margin-top: 0px !important; 

            z-index: 99999999 !important; /* Berada di atas lapisan nav */

            border-radius: 6px; 

            border: 1px solid rgba(211, 3, 3, 0.4);

            box-shadow: 0px 8px 24px rgba(211, 3, 3, 0.4); 

            overflow: hidden;

            padding: 6px 0 !important;

        }

        /* Link di dalam Dropdown (Skill & Info PTN) */
        .nav-dropdown-content a {
    color: white !important; 
    padding: 12px 20px !important; 
    text-decoration: none !important;
    display: flex !important; 
    align-items: center !important; 
    gap: 10px !important; 
    font-size: 0.95rem !important; /* Ukuran font ideal yang sama dengan halaman lain */
    border-bottom: none !important; 
    font-weight: normal !important; /* Mencegah teks menjadi terlalu tebal */
    pointer-events: auto !important;
    transition: background 0.2s ease !important;
}
    
        .nav-dropdown-content a:hover { 

            background-color: rgb(171, 0, 0) !important; 

            color: white !important; 

        }

        /* Trigger Hover */
        .nav-dropdown-wrapper:hover .nav-dropdown-content { 
            display: block !important; 

        }

    </style>

</head>

<body> 

    <nav>
    <div class="nav-container">
        <div class="logo">Akadara</div>
        
        <div class="links desktop-menu">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Design Product</a>
            
            <div class="nav-dropdown-wrapper">
                <a class="dropbtn">Product <i class="fa-solid fa-caret-down"></i></a>
                <div class="nav-dropdown-content">
                    <a href="skill.html">Produk Akhir</a>
                    <a href="info-ptn.html">Game Scratch</a>
                </div>
            </div>
        </div>

        <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
    </div>

    <div class="dropdown">
        <div class="links">
            <i class="fa-solid fa-xmark cancel" onclick="cancelMenu()"></i> 
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Design Product</a> 
            <a href="skill.html">Produk Akhir</a>
            <a href="info-ptn.html">Game Scratch</a>
        </div>
    </div>
    </nav>


    <section>

        <div class="main-container">

            <div class="content">

                <h1 data-aos="fade-left">Akadara</h1>

                <div class="typewriter" data-aos="fade-right">

                    Your news is a mail away, <span>stay tuned!</span>

                </div>

                <p data-aos="flip-down">

                    Welcome to Akadara, your trusted source for fresh updates,

                    stories, and breaking news delivered beautifully.

                </p>

                <div class="btn">

                    <a href="about.html">

                        <button>About Us</button>

                    </a>

                </div>

            </div>

            

            <div class="image" data-aos="zoom-in">

                <img src="logo akadara.png.jpeg" alt="Akadara">

            </div>

        </div>

    </section>



    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>

    <script>

        AOS.init({ offset: 0 });

    </script>

    <script src="script.js"></script>

</body>

</html>
