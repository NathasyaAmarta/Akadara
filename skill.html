    <style>
        /* TETAP MEMAKSA FONT PLAYFAIR DISPLAY PILIHAN KELOMPOK LO */
        nav, .logo, .links a, .dropbtn, .nav-dropdown-content a, .dropdown .links a,
        .content h1, .typewriter, .content p, .btn button {
            font-family: 'Playfair Display', Georgia, serif !important;
        }

        /* Struktur Dropdown Laptop (Biar Gak Bug Samaan Kayak About Us) */
        .nav-dropdown-wrapper { 
            position: relative; 
            display: inline-block; 
        }
        .nav-dropdown-wrapper .dropbtn { 
            cursor: pointer; 
            display: inline-flex;
            align-items: center;
            color: white;
            text-decoration: none;
        }
        .nav-dropdown-wrapper .dropbtn i { 
            margin-left: 5px; 
            font-size: 0.8rem; 
            transition: transform 0.3s; 
        }
        .nav-dropdown-wrapper:hover .dropbtn i { 
            transform: rotate(180deg); 
        }
        .nav-dropdown-content {
            display: none; 
            position: absolute; 
            background-color: rgba(18, 18, 18, 0.98);
            backdrop-filter: blur(10px); 
            min-width: 200px; 
            top: 100%; 
            left: 50%;
            transform: translateX(-50%); 
            z-index: 999999; 
            border-radius: 6px; 
            border: 1px solid rgba(211, 3, 3, 0.4);
            box-shadow: 0px 8px 24px rgba(211, 3, 3, 0.4); 
            overflow: hidden;
            padding: 6px 0;
        }
        .nav-dropdown-content a {
            color: white !important; 
            padding: 12px 20px !important; 
            text-decoration: none !important;
            display: flex !important; 
            align-items: center !important; 
            gap: 10px !important; 
            font-size: 0.95rem !important;
            font-weight: normal !important;
            transition: background 0.2s ease !important;
        }
        .nav-dropdown-content a:hover { 
            background-color: rgb(171, 0, 0) !important; 
        }
        .nav-dropdown-wrapper:hover .nav-dropdown-content { 
            display: block; 
        }

        /* =======================================================
           CSS KHUSUS UNTUK MEMAKSA BADGE COLAB PAS DI TENGAH LAYAR
           ======================================================= */
        .colab-integration-box {
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            width: 100% !important;
            margin-top: 35px !important; /* Jarak proporsional di bawah kotak product-section */
            margin-bottom: 50px !important;
        }

        .colab-integration-box .badge-link {
            display: inline-block !important;
            box-shadow: 0 0 15px rgba(211, 3, 3, 0.4); /* Efek glow tipis selaras tema web lo */
            border-radius: 6px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .colab-integration-box .badge-link:hover {
            box-shadow: 0 0 25px rgba(211, 3, 3, 0.7);
            transform: scale(1.05); /* Sedikit membesar transisi halus saat disentuh mouse */
        }
    </style>
