<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akadara - PTN Checker</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    <link rel="stylesheet" href="styles.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <style>
        /* TETAP MEMAKSA FONT PLAYFAIR DISPLAY PILIHAN KELOMPOK LO */
        nav, .logo, .links a, .dropbtn, .nav-dropdown-content a, .dropdown .links a,
        .content h1, .typewriter, .content p, .btn button {
            font-family: 'Playfair Display', Georgia, serif !important;
        }

        /* Struktur Dropdown Laptop (Biar Gak Bug Samaan Kayak About Us) */
        .nav-dropdown-wrapper { 
            position: relative; 
            display: inline-block; 
        }
        .nav-dropdown-wrapper .dropbtn { 
            cursor: pointer; 
            display: inline-flex;
            align-items: center;
            color: white;
            text-decoration: none;
        }
        .nav-dropdown-wrapper .dropbtn i { 
            margin-left: 5px; 
            font-size: 0.8rem; 
            transition: transform 0.3s; 
        }
        .nav-dropdown-wrapper:hover .dropbtn i { 
            transform: rotate(180deg); 
        }
        .nav-dropdown-content {
            display: none; 
            position: absolute; 
            background-color: rgba(18, 18, 18, 0.98);
            backdrop-filter: blur(10px); 
            min-width: 200px; 
            top: 100%; 
            left: 50%;
            transform: translateX(-50%); 
            z-index: 999999; 
            border-radius: 6px; 
            border: 1px solid rgba(211, 3, 3, 0.4);
            box-shadow: 0px 8px 24px rgba(211, 3, 3, 0.4); 
            overflow: hidden;
            padding: 6px 0;
        }
        .nav-dropdown-content a {
            color: white !important; 
            padding: 12px 20px !important; 
            text-decoration: none !important;
            display: flex !important; 
            align-items: center !important; 
            gap: 10px !important; 
            font-size: 0.95rem !important;
            font-weight: normal !important;
            transition: background 0.2s ease !important;
        }
        .nav-dropdown-content a:hover { 
            background-color: rgb(171, 0, 0) !important; 
        }
        .nav-dropdown-wrapper:hover .nav-dropdown-content { 
            display: block; 
        }

        /* =======================================================
           STYLE UNTUK MERAPIKAN TOMBOL COLAB BIAR MATCHING & TENGAH
           ======================================================= */
        .colab-button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-top: 30px; /* Jarak dari kotak hasil PTN ke tombol */
            margin-bottom: 30px;
        }

        /* Kita paksa tombol birunya berubah jadi hitam-merah glow */
        .colab-button-container a {
            background: linear-gradient(135deg, #111 0%, #222 100%) !important;
            border: 1px solid rgba(211, 3, 3, 0.5) !important;
            color: white !important;
            padding: 12px 28px !important;
            border-radius: 30px !important; /* Membuat ujungnya melingkar bagus */
            font-weight: bold !important;
            text-decoration: none !important;
            display: inline-flex !important;
            align-items: center !important;
            gap: 10px !important;
            font-size: 0.95rem !important;
            box-shadow: 0 4px 15px rgba(211, 3, 3, 0.2) !important;
            transition: all 0.3s ease !important;
            cursor: pointer !important;
        }

        /* Efek hover pas kursor komputer menyentuh tombolnya */
        .colab-button-container a:hover {
            background: rgb(171, 0, 0) !important;
            border-color: rgb(211, 3, 3) !important;
            box-shadow: 0 0 20px rgba(211, 3, 3, 0.6) !important;
            transform: translateY(-2px); /* Tombol sedikit mengangkat naik */
        }
    </style>
</head>
<body> 

    <nav>
        <div class="nav-container">
            <div class="logo">Akadara</div>
            
            <div class="links desktop-menu">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Design Product</a>
                
                <div class="nav-dropdown-wrapper">
                    <a class="dropbtn">Product <i class="fa-solid fa-caret-down"></i></a>
                    <div class="nav-dropdown-content">
                        <a href="skill.html">Produk Akhir</a>
                        <a href="info-ptn.html">Game Scratch</a>
                    </div>
                </div>
            </div>

            <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
        </div>

        <div class="dropdown">
            <div class="links">
                <i class="fa-solid fa-xmark cancel" onclick="cancelMenu()"></i> 
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Design Product</a> 
                <a href="skill.html">Produk Akhir</a>
                <a href="info-ptn.html">Game Scratch</a>
            </div>
        </div>
    </nav>

    <div class="main-container" data-aos="fade-up">
        <div class="search-box">
            <div class="form-group">
                <select id="kategori" onchange="updateJurusan()">
                    <option value="">-- Pilih Kategori --</option>
                    <option value="IPA">Saintek</option>
                    <option value="IPS">Soshum</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="jurusan">Pilih Jurusan Spesifik:</label>
                <select id="jurusan" disabled>
                    <option value="">-- Pilih Kategori Dulu --</option>
                </select>
            </div>
            
            <button class="search-btn" onclick="cekPTN()">Cari Top 3 PTN</button>
        </div>

        <div id="hasil" class="result-container" style="display: none;">
            <h3 class="result-title">Top 3 PTN Untuk Jurusan: <span id="nama-jurusan-terpilih"></span></h3>
            <div id="container-logo" class="logo-grid">
                </div>
        </div>

        <div class="colab-button-container">
            <a href="https://colab.research.google.com/drive/1A_wTzO2V0Gis939YV4K6IexIis45iQdI" target="_blank" rel="noopener">
                <i class="fa-solid fa-code"></i> Open in Colab
            </a>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ offset: 0, duration: 800 });
    </script>
</body>
</html>
