<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akadara - Choose Your PTN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">

    <style>
        .nav-dropdown-wrapper { 
            position: relative; 
            display: inline-block; 
        }
        .nav-dropdown-wrapper .dropbtn { 
            cursor: pointer; 
            color: white; 
            text-decoration: none; 
            font-size: 1.1rem; 
            font-weight: 500; 
            transition: 0.3s; 
        }
        .nav-dropdown-wrapper .dropbtn i { 
            margin-left: 5px; 
            font-size: 0.8rem; 
            transition: transform 0.3s; 
        }
        .nav-dropdown-wrapper:hover .dropbtn i { 
            transform: rotate(180deg); 
        }
        .nav-dropdown-content {
            display: none; 
            position: absolute; 
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px); 
            min-width: 190px; 
            top: 100%; 
            left: 50%;
            transform: translateX(-50%); 
            margin-top: 10px; 
            z-index: 2000;
            border-radius: 6px; 
            border: 1px solid rgba(211, 3, 3, 0.4);
            box-shadow: 0px 8px 24px rgba(211, 3, 3, 0.3); 
            overflow: hidden;
        }
        .nav-dropdown-content a {
            color: white !important; 
            padding: 12px 18px !important; 
            text-decoration: none !important;
            display: flex !important; 
            align-items: center; 
            gap: 10px; 
            font-size: 0.95rem !important;
            border-bottom: none !important; 
            transition: background 0.3s, color 0.3s !important;
        }
        .nav-dropdown-content a:hover { 
            background-color: rgb(171, 0, 0) !important; 
            color: white !important; 
        }
        .nav-dropdown-wrapper:hover .nav-dropdown-content { 
            display: block; 
        }
        .nav-dropdown-content a:hover { 
            border-bottom: none !important; 
        }
    </style>
</head>
<body class="product-page">

    <nav>
        <div class="nav-container">
            <div class="logo">Akadara</div>
            <div class="links">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Design Product</a>
                
                <div class="nav-dropdown-wrapper">
                    <a href="#" class="dropbtn">Product <i class="fa-solid fa-caret-down"></i></a>
                    <div class="nav-dropdown-content">
                        <a href="skill.html"><i class="fa-solid fa-briefcase"></i> Skill Product</a>
                        <a href="info-ptn.html"><i class="fa-solid fa-graduation-cap"></i> Info PTN Python</a>
                    </div>
                </div>
            </div>
        </div>
        <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
        
        <div class="dropdown">
            <div class="links">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Design Product</a> 
                <a href="skill.html">Product (Skill)</a>
                <a href="info-ptn.html">Product (Info PTN)</a>
                <i class="fa-solid fa-xmark cancel" onclick="cancelMenu()"></i> 
            </div>
        </div>
    </nav>

    <section class="product-section-only">
        <div class="container-product">
            <h2>AKADARA - CHOOSE YOUR PTN</h2>
            <p class="product-desc">Cari tahu 3 Perguruan Tinggi Negeri terbaik berdasarkan kategori dan jurusan impianmu.</p>
            
            <form id="form-cari">
                <div class="form-group">
                    <label for="kategori">Pilih Kategori Jurusan:</label>
                    <select id="kategori" onchange="updateJurusan()">
                        <option value="">-- Pilih Kategori --</option>
                        <option value="IPA">Saintek</option>
                        <option value="IPS">Soshum</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="jurusan">Pilih Jurusan Spesifik:</label>
                    <select id="jurusan" disabled>
                        <option value="">-- Pilih Kategori Dulu --</option>
                    </select>
                </div>

                <button type="button" class="btn-search" onclick="cekPTN()">Cari Top 3 PTN</button>
            </form>

            <div id="hasil" style="display: none; margin-top: 25px;">
                <h3 style="color: #fff; margin-bottom: 15px;">Top 3 PTN Untuk Jurusan: <span id="nama-jurusan-terpilih" style="color: #d30303;"></span></h3>
                <div id="container-logo" class="container-logo-ptn"></div>
            </div>
        </div>
    </section>

    <script src="script.js"></script> 
</body>
</html>
