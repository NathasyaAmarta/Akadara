<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akadara</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    <link rel="stylesheet" href="styles.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

   <style>
        /* TETAP MEMAKSA FONT PLAYFAIR DISPLAY PILIHAN KELOMPOK LO */
        nav, .logo, .links a, .dropbtn, .nav-dropdown-content a, .dropdown .links a,
        .content h1, .typewriter, .content p, .btn button {
            font-family: 'Playfair Display', Georgia, serif !important;
        }

        /* Struktur Dropdown Laptop (Biar Gak Bug Samaan Kayak About Us) */
        .nav-dropdown-wrapper { 
            position: relative; 
            display: inline-block; 
        }
        .nav-dropdown-wrapper .dropbtn { 
            cursor: pointer; 
            display: inline-flex;
            align-items: center;
            color: white;
            text-decoration: none;
        }
        .nav-dropdown-wrapper .dropbtn i { 
            margin-left: 5px; 
            font-size: 0.8rem; 
            transition: transform 0.3s; 
        }
        .nav-dropdown-wrapper:hover .dropbtn i { 
            transform: rotate(180deg); 
        }
        .nav-dropdown-content {
            display: none; 
            position: absolute; 
            background-color: rgba(18, 18, 18, 0.98);
            backdrop-filter: blur(10px); 
            min-width: 200px; 
            top: 100%; 
            left: 50%;
            transform: translateX(-50%); 
            z-index: 999999; 
            border-radius: 6px; 
            border: 1px solid rgba(211, 3, 3, 0.4);
            box-shadow: 0px 8px 24px rgba(211, 3, 3, 0.4); 
            overflow: hidden;
            padding: 6px 0;
        }
        .nav-dropdown-content a {
            color: white !important; 
            padding: 12px 20px !important; 
            text-decoration: none !important;
            display: flex !important; 
            align-items: center !important; 
            gap: 10px !important; 
            font-size: 0.95rem !important;
            font-weight: normal !important;
            transition: background 0.2s ease !important;
        }
        .nav-dropdown-content a:hover { 
            background-color: rgb(171, 0, 0) !important; 
        }
        .nav-dropdown-wrapper:hover .nav-dropdown-content { 
            display: block; 
        }

        /* =======================================================
           PENGAMAN SUPER KETAT BIAR GAME BENERAN PINDAH KE TENGAH
           ======================================================= */
        .game-section {
            width: 100% !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;    
            justify-content: center !important;
            text-align: center !important;
            padding: 60px 20px !important;
            margin: 0 auto !important;
        }

        /* =======================================================
           CLONE KODE .container-product h2 MILIK KELOMPOK LO 100%
           ======================================================= */
        .game-section h1 {
            text-align: center !important;  
            color: #cc0000 !important;              /* Merah khas Akadara */
            font-size: 1.8rem !important;            /* Ukuran pas proporsional */
            filter: drop-shadow(0px 2px 8px rgba(243, 74, 74, 0.6)) !important; /* Efek shadow estetik */
            margin-bottom: 5px !important;  
            text-transform: uppercase !important;   /* Kapital semua otomatis */
            letter-spacing: 1px !important;        /* Jarak antar huruf */
            width: 100% !important;
            font-weight: bold !important;
        }

        .game-section p {
            margin-bottom: 30px !important;
            color: #ccc !important;
            width: 100% !important;
        }

        .scratch-frame-container {
            width: 60% !important;            
            max-width: 642px !important;      
            height: 512px !important;
            margin: 0 auto !important;        
            position: relative !important;
            box-shadow: 0 0 25px rgba(211, 3, 3, 0.35) !important;
            border-radius: 12px !important;
            overflow: hidden !important;
            border: 1px solid #333 !important;
            background-color: #111 !important;
            display: block !important;
        }

        .scratch-iframe {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            display: block !important;
        }

        /* Penyesuaian Responsif Layar HP */
        @media screen and (max-width: 768px) {
            .scratch-frame-container {
                width: 95% !important;
                height: 300px !important;
            }
            .game-section h1 {
                font-size: 1.5rem !important; /* Di HP dikecilkan sedikit biar pas */
            }
        }
    </style> 

    <nav>
        <div class="nav-container">
            <div class="logo">Akadara</div>
            
            <div class="links desktop-menu">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Design Product</a>
                
                <div class="nav-dropdown-wrapper">
                    <a class="dropbtn">Product <i class="fa-solid fa-caret-down"></i></a>
                    <div class="nav-dropdown-content">
                        <a href="skill.html">Produk Akhir</a>
                        <a href="info-ptn.html">Game Scratch</a>
                    </div>
                </div>
            </div>

            <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
        </div>

        <div class="dropdown">
            <div class="links">
                <i class="fa-solid fa-xmark cancel" onclick="cancelMenu()"></i> 
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Design Product</a> 
                <a href="skill.html">Produk Akhir</a>
                <a href="info-ptn.html">Game Scratch</a>
            </div>
        </div>
    </nav>

    <section class="game-section">
        <h1 data-aos="fade-down">Maze Runner PTN</h1>
        <p data-aos="fade-up">Silakan main game Akadara</p>

        <div class="scratch-frame-container" data-aos="zoom-in">
            <iframe src="https://scratch.mit.edu/projects/1326920369/embed" class="scratch-iframe" allowtransparency="true" allowfullscreen="true" scrolling="no"></iframe>
        </div>
    </section>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ offset: 0 });
    </script>
    <script src="script.js"></script>
</body>
</html>
