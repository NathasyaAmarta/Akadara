    <style>
        /* SINKRONISASI NAVBAR AKADARA */
        nav {
            position: relative !important;
            z-index: 9999999 !important;
        }

        nav, .logo, .links a, .dropbtn, .nav-dropdown-content a, .dropdown .links a,
        .game-section h1, .game-section p {
            font-family: 'Playfair Display', Georgia, serif !important;
        }

        .links {
            display: flex !important;
            align-items: center !important; 
            gap: 25px; 
        }

        .nav-dropdown-wrapper { 
            position: relative; 
            display: inline-block; 
        }
        
        .nav-dropdown-wrapper .dropbtn { 
            cursor: pointer; 
            display: inline-flex;
            align-items: center;
            padding: 15px 0 !important; 
            color: white;
            text-decoration: none;
        }
        
        .nav-dropdown-wrapper .dropbtn i { 
            margin-left: 5px; 
            font-size: 0.8rem; 
            transition: transform 0.3s; 
        }
        .nav-dropdown-wrapper:hover .dropbtn i { 
            transform: rotate(180deg); 
        }
        
        .nav-dropdown-content {
            display: none !important; 
            position: absolute; 
            background-color: rgba(18, 18, 18, 0.98) !important;
            backdrop-filter: blur(10px); 
            min-width: 200px; 
            top: 100% !important; 
            left: 50%;
            transform: translateX(-50%); 
            margin-top: 0px !important; 
            z-index: 99999999 !important;
            border-radius: 6px; 
            border: 1px solid rgba(211, 3, 3, 0.4);
            box-shadow: 0px 8px 24px rgba(211, 3, 3, 0.4); 
            overflow: hidden;
            padding: 6px 0 !important;
        }

        .nav-dropdown-content a {
            color: white !important; 
            padding: 12px 20px !important; 
            text-decoration: none !important;
            display: flex !important; 
            align-items: center !important; 
            gap: 10px !important; 
            font-size: 0.95rem !important;
            border-bottom: none !important; 
            font-weight: normal !important;
            pointer-events: auto !important;
            transition: background 0.2s ease !important;
        }
        
        .nav-dropdown-content a:hover { 
            background-color: rgb(171, 0, 0) !important; 
            color: white !important; 
        }
        
        .nav-dropdown-wrapper:hover .nav-dropdown-content { 
            display: block !important; 
        }

        /* STYLING AREA GAME SCRATCH */
        .game-section {
            width: 100%;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: white;
        }

        .game-section h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .game-section p {
            font-size: 1.1rem;
            color: #bbbbbb;
            margin-bottom: 30px;
            text-align: center;
            max-width: 650px;
            line-height: 1.6;
        }

        /* Bingkai Premium Game Scratch */
        .scratch-frame-container {
            width: 100%;
            max-width: 680px; /* Lebar optimal rasio layar Scratch */
            background: rgba(26, 26, 26, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(211, 3, 3, 0.4);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(211, 3, 3, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .scratch-iframe {
            width: 100%;
            height: 480px; /* Tinggi standar layar game scratch agar pas */
            border: none;
            border-radius: 8px;
            background: #000;
        }
    </style>
</head>
