<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <style>
        h1, h2, h3, .logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
        }

        /* --- FIX HOVER GAP DROPDOWN --- */
        .nav-dropdown-wrapper { 
            position: relative; 
            display: inline-block;
        }
        
        .nav-dropdown-wrapper .dropbtn { 
            cursor: pointer;
            padding: 20px 10px !important; /* Dipertebal agar area deteksi kursor lebih luas */
            display: inline-flex;
            align-items: center;
        }
        
        .nav-dropdown-wrapper .dropbtn i { 
            margin-left: 6px; 
            font-size: 0.8rem; 
            transition: transform 0.3s; 
        }
        
        .nav-dropdown-wrapper:hover .dropbtn i { 
            transform: rotate(180deg); 
        }

        /* Kotak Dropdown Menu */
        .nav-dropdown-content {
            display: none !important; 
            position: absolute; 
            background-color: rgba(18, 18, 18, 0.98) !important; 
            backdrop-filter: blur(10px); 
            min-width: 200px; 
            top: 100%; /* Menempel pas di bawah tombol induk */
            left: 50%;
            transform: translateX(-50%); 
            margin-top: 0px !important; /* PERBAIKAN: Jarak 0px agar kursor tidak mendeteksi celah kosong */
            z-index: 999999 !important; 
            border-radius: 6px; 
            border: 1px solid rgba(211, 3, 3, 0.5);
            box-shadow: 0px 8px 24px rgba(211, 3, 3, 0.4); 
            overflow: hidden;
            padding: 5px 0;
        }

        /* Link di dalam Dropdown */
        .nav-dropdown-content a {
            color: #ffffff !important; 
            padding: 12px 20px !important; 
            text-decoration: none !important;
            display: flex !important; 
            align-items: center !important; 
            gap: 12px; 
            font-size: 0.95rem !important;
            border-bottom: none !important; 
            font-weight: 500 !important;
            pointer-events: auto !important; 
            transition: background 0.2s ease-in-out !important;
        }

        .nav-dropdown-content a:hover { 
            background-color: rgb(211, 3, 3) !important; 
            color: #ffffff !important;
        }
        
        /* Trigger Hover stabil */
        .nav-dropdown-wrapper:hover .nav-dropdown-content { 
            display: block !important; 
        }

        /* --- KONTEN PPT CANVA --- */
        .canva-holder {
            max-width: 850px; 
            width: 100%;
            margin: 0 auto;
        }

        .canva-wrapper {
            position: relative; 
            width: 100%; 
            height: 0; 
            padding-top: 56.2500%; 
            box-shadow: 0 8px 32px rgba(211, 3, 3, 0.2); 
            overflow: hidden;
            border-radius: 12px; 
            border: 1px solid rgba(211, 3, 3, 0.4);
            will-change: transform;
        }
    </style>
</head>
<body>
    
    <nav style="box-sizing: border-box !important;">

                <a href="contact.html">Design Product</a>
                
                <div class="nav-dropdown-wrapper">
                    <a class="dropbtn">Product <i class="fa-solid fa-caret-down"></i></a>
                    <div class="nav-dropdown-content">
                        <a href="skill.html"><i class="fa-solid fa-briefcase"></i> Skill Product</a>
                        <a href="info-ptn.html"><i class="fa-solid fa-graduation-cap"></i> Info PTN Python</a>
                    </div>
                </div>
            </div>
        </div>
        <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
        <div class="dropdown">
            <div class="links">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Design Product</a> 
                <a href="skill.html">Product (Skill)</a>
                <a href="info-ptn.html">Product (Info PTN)</a>
                <i class="fa-solid fa-xmark cancel" onclick="cancel()"></i> 
            </div>
        </div>
    </nav>

    <section>
        <div class="main-container" data-aos="fade-up" style="padding-top: 60px !important;">
            
            <div class="canva-holder">
                <div class="canva-wrapper">
                    <iframe style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0; margin: 0;"
                        src="https://www.canva.com/design/DAHGZL7VMkY/jxAW3_ymxUhWVtInttLA6g/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
                    </iframe>
                </div>
            </div>

        </div>
    </section>

    <script src="script.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>

        AOS.init({ offset: 0, duration: 800 });
    </script>
</body>
