   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - Akadara</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <style>
        /* Mengatur agar semua judul menggunakan Playfair Display */
        h1, h2, h3, .mainname {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
        }

        /* PERBAIKAN: Memastikan header berada di lapisan paling atas agar tidak tertutup konten section */
        header {
            position: relative;
            z-index: 2000 !important;
        }

        /* Dropdown CSS Styling supaya menu Product bisa diklik seperti di Home */
        .nav-dropdown-wrapper {
            position: relative;
            display: inline-block;
        }
        .nav-dropdown-wrapper .dropbtn {
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .nav-dropdown-wrapper .dropbtn i {
            margin-left: 5px;
            font-size: 0.8rem;
            transition: transform 0.3s;
        }
        .nav-dropdown-wrapper:hover .dropbtn i {
            transform: rotate(180deg);
        }
        .nav-dropdown-content {
            display: none;
            position: absolute;
            background-color: #ffffff; /* Latar belakang dropdown putih */
            min-width: 180px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.15);
            z-index: 9999 !important; /* Memastikan menu melayang di atas konten */
            border-radius: 4px;
            top: 100%;
            left: 0;
        }
        .nav-dropdown-wrapper:hover .nav-dropdown-content {
            display: block;
        }
        .nav-dropdown-content a {
            color: #333333 !important; /* Warna teks isi dropdown tetap gelap agar kontras di latar putih */
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            border-bottom: none !important;
            font-weight: normal !important;
        }
        .nav-dropdown-content a:hover {
            background-color: #f1f1f1;
        }

        /* PERBAIKAN: Membatasi lebar maksimal Canva agar tidak terlalu besar di layar monitor */
        .canva-holder {
            max-width: 850px; /* Ukuran maksimal lebar presentasi agar pas di mata */
            width: 100%;
            margin: 0 auto; /* Supaya otomatis berada di tengah halaman */
        }

        /* Pembungkus Khusus Konten Canva Anda */
        .canva-wrapper {
            position: relative; 
            width: 100%; 
            height: 0; 
            padding-top: 56.2500%; /* Aspek rasio 16:9 murni */
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
            overflow: hidden;
            border-radius: 8px; 
            will-change: transform;
        }
    </style>
</head>

<body>
    <header style="display: flex !important; justify-content: space-between !important; align-items: center !important; width: 100% !important; padding-left: 40px !important; padding-right: 40px !important; box-sizing: border-box !important;">
        <div class="mainname" data-aos="zoom-in">Akadara <span style="color: rgb(211, 3, 3);">.</span></div>
        
        <div class="links" style="display: flex !important; gap: 25px !important; margin-left: auto !important; align-items: center !important;">
            <a href="index.html">Home</a>
            <a href="about.html" style="color: rgb(211, 3, 3); border-bottom: 2px solid rgb(211, 3, 3); font-weight: bold;">About Us</a>
            <a href="contact.html">Design Product</a>
            
            <div class="nav-dropdown-wrapper">
                <a href="#" class="dropbtn">Product <i class="fa-solid fa-caret-down"></i></a>
                <div class="nav-dropdown-content">
                    <a href="skill.html"><i class="fa-solid fa-briefcase"></i> Skill Product</a>
                    <a href="info-ptn.html"><i class="fa-solid fa-graduation-cap"></i> Info PTN Python</a>
                </div>
            </div>
        </div>
    </header>

    <section>
        <div class="main-container" data-aos="fade-up" style="padding-top: 60px;">
            
            <div class="canva-holder">
                <div class="canva-wrapper">
                    <iframe style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0; margin: 0;"
                        src="https://www.canva.com/design/DAHGZL7VMkY/jxAW3_ymxUhWVtInttLA6g/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
                    </iframe>
                </div>
            </div>

        </div>
    </section>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ offset: 0, duration: 800 });
    </script>
</body>
</html>
