<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - Akadara</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    <link rel="stylesheet" href="styles.css">

    <style>
        /* PERBAIKAN UTAMA: Memaksa semua menu di dalam .links rata tengah secara vertikal */
        .links {
            display: flex !important;
            align-items: center !important; /* Membuat semua teks menu lurus sejajar horizontal */
            gap: 25px; /* Jarak antar menu */
        }

        /* CSS DROPDOWN UTAMA */
        .nav-dropdown-wrapper { 
            position: relative; 
            display: inline-block; 
        }
        
        .nav-dropdown-wrapper .dropbtn { 
            cursor: pointer; 
            display: inline-flex;
            align-items: center;
            padding: 0; /* Menghilangkan padding bawaan sebelumnya agar tidak merusak baris */
            height: 100%;
        }
        
        .nav-dropdown-wrapper .dropbtn i { 
            margin-left: 5px; 
            font-size: 0.8rem; 
            transition: transform 0.3s; 
        }
        .nav-dropdown-wrapper:hover .dropbtn i { 
            transform: rotate(180deg); 
        }
        
        /* Kotak Dropdown Menu */
        .nav-dropdown-content {
            display: none; 
            position: absolute; 
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px); 
            min-width: 190px; 
            top: 100%; 
            left: 50%;
            transform: translateX(-50%); 
            margin-top: 15px !important; /* Memberi jarak aman kotak dropdown di bawah navbar */
            z-index: 9999 !important;
            border-radius: 6px; 
            border: 1px solid rgba(211, 3, 3, 0.4);
            box-shadow: 0px 8px 24px rgba(211, 3, 3, 0.3); 
            overflow: hidden;
        }

        /* Jembatan Transparan (Invisible Bridge) agar hover tidak putus/hilang saat kursor turun */
        .nav-dropdown-content::before {
            content: "";
            position: absolute;
            top: -20px;
            left: 0;
            width: 100%;
            height: 20px;
            background: transparent;
        }

        .nav-dropdown-content a {
            color: white !important; 
            padding: 12px 18px !important; 
            text-decoration: none !important;
            display: flex !important; 
            align-items: center; 
            gap: 10px; 
            font-size: 0.95rem !important;
            border-bottom: none !important; 
            transition: background 0.3s, color 0.3s !important;
        }
