    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        /* Mengatur agar semua judul menggunakan Playfair Display */
        h1, h2, h3, .logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
        }

        /* CSS DROPDOWN BIAR TETEP AKTIF DI HALAMAN INI */
        .nav-dropdown-wrapper { 
            position: relative; 
            display: inline-block; 
        }
        .nav-dropdown-wrapper .dropbtn { 
            cursor: pointer; 
        }
        .nav-dropdown-wrapper .dropbtn i { 
            margin-left: 5px; 
            font-size: 0.8rem; 
            transition: transform 0.3s; 
        }
        .nav-dropdown-wrapper:hover .dropbtn i { 
            transform: rotate(180deg); 
        }
        .nav-dropdown-content {
            display: none; 
            position: absolute; 
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px); 
            min-width: 190px; 
            top: 100%; 
            left: 50%;
            transform: translateX(-50%); 
            margin-top: 10px; 
            z-index: 2000;
            border-radius: 6px; 
            border: 1px solid rgba(211, 3, 3, 0.4);
            box-shadow: 0px 8px 24px rgba(211, 3, 3, 0.3); 
            overflow: hidden;
        }
        .nav-dropdown-content a {
            color: white !important; 
            padding: 12px 18px !important; 
            text-decoration: none !important;
            display: flex !important; 
            align-items: center; 
            gap: 10px; 
            font-size: 0.95rem !important;
            border-bottom: none !important; 
            transition: background 0.3s, color 0.3s !important;
        }
        .nav-dropdown-content a:hover { 
            background-color: rgb(171, 0, 0) !important; 
            color: white !important; 
        }
        .nav-dropdown-wrapper:hover .nav-dropdown-content { 
            display: block; 
        }

        /* Pembungkus Tambahan untuk Menyusutkan Ukuran Canva PPT */
        .canva-holder {
            max-width: 850px; /* Ukuran pas di layar biar gak raksasa */
            width: 100%;
            margin: 0 auto;
        }

        /* Pembungkus Khusus Konten Canva Anda */
        .canva-wrapper {
            position: relative; 
            width: 100%; 
            height: 0; 
            padding-top: 56.2500%; /* Aspek rasio 16:9 murni */
            box-shadow: 0 8px 32px rgba(211, 3, 3, 0.2); 
            overflow: hidden;
            border-radius: 12px; 
            border: 1px solid rgba(211, 3, 3, 0.4);
            will-change: transform;
        }
    </style>
</head>

                    </div>
                </div>
            </div>
        </div>

        <div class="dropdown">
            <div class="links">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Design Product</a>

            </div>
        </div>
    </nav>

                    <iframe style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0; margin: 0;"
