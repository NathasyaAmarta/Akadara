<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - Akadara</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    <link rel="stylesheet" href="styles.css">

    <style>
        /* CSS DROPDOWN UTAMA - DISESUAIKAN AGAR TIDAK HILANG SAAT DI-HOVER */
        .nav-dropdown-wrapper { 
            position: relative; 
            display: inline-block; 
        }
        .nav-dropdown-wrapper .dropbtn { 
            cursor: pointer; 
            padding: 15px 0; /* Menambah area peka kursor secara vertikal */
        }
        .nav-dropdown-wrapper .dropbtn i { 
            margin-left: 5px; 
            font-size: 0.8rem; 
            transition: transform 0.3s; 
        }
        .nav-dropdown-wrapper:hover .dropbtn i { 
            transform: rotate(180deg); 
        }
        
        .nav-dropdown-content {
            display: none; 
            position: absolute; 
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px); 
            min-width: 190px; 
            top: 100%; 
            left: 50%;
            transform: translateX(-50%); 
            margin-top: 0px !important; /* PERBAIKAN: Dibuat 0px agar TIDAK ADA CELAH KOSONG yang bikin menu hilang */
            z-index: 9999 !important;
            border-radius: 6px; 
            border: 1px solid rgba(211, 3, 3, 0.4);
            box-shadow: 0px 8px 24px rgba(211, 3, 3, 0.3); 
            overflow: hidden;
        }
        .nav-dropdown-content a {
            color: white !important; 
            padding: 12px 18px !important; 
            text-decoration: none !important;
            display: flex !important; 
            align-items: center; 
            gap: 10px; 
            font-size: 0.95rem !important;
            border-bottom: none !important; 
            transition: background 0.3s, color 0.3s !important;
        }
        .nav-dropdown-content a:hover { 
            background-color: rgb(171, 0, 0) !important; 
            color: white !important; 
        }
        
        /* Memastikan trigger hover tetap stabil melalui CSS */
        .nav-dropdown-wrapper:hover .nav-dropdown-content { 
            display: block !important; 
        }

        /* SUSUNAN LAYOUT UNTUK PPT CANVA */
        .iframe-section {
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 40px 20px; 
        }
        .iframe-container {
            max-width: 850px; /* Membatasi lebar PPT agar pas di layar dan tidak raksasa */
            width: 100%; 
            position: relative;
            height: 0;
            padding-top: 56.25%; /* Aspek rasio 16:9 murni */
            background: rgba(26, 26, 26, 0.75);
            border-radius: 12px; 
            border: 1px solid rgba(211, 3, 3, 0.4);
            box-shadow: 0 8px 32px rgba(211, 3, 3, 0.2); 
            overflow: hidden;
        }
        .iframe-container iframe { 
            position: absolute;
            width: 100%; 
            height: 100%; 
            top: 0;
            left: 0;
            border: none; 
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">Akadara</div>
            <div class="links">
                <a href="index.html">Home</a>
                <a href="about.html" style="color: rgb(211, 3, 3); border-bottom: 2px solid rgb(211, 3, 3); font-weight: bold;">About Us</a>
                <a href="contact.html">Design Product</a>
                <div class="nav-dropdown-wrapper">
                    <a href="#" class="dropbtn">Product <i class="fa-solid fa-caret-down"></i></a>
                    <div class="nav-dropdown-content">
                        <a href="skill.html"><i class="fa-solid fa-briefcase"></i> Skill Product</a>
                        <a href="info-ptn.html"><i class="fa-solid fa-graduation-cap"></i> Info PTN Python</a>
                    </div>
                </div>
            </div>
        </div>
        <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
        <div class="dropdown">
           <div class="links">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Design Product</a> 
                <a href="skill.html">Product (Skill)</a>
                <a href="info-ptn.html">Product (Info PTN)</a>
                <i class="fa-solid fa-xmark cancel" onclick="cancel()"></i> 
            </div>
        </div>
    </nav>

    <div class="iframe-section" data-aos="fade-up">
        <div class="iframe-container">
            <iframe src="https://www.canva.com/design/DAHGZL7VMkY/jxAW3_ymxUhWVtInttLA6g/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ offset: 0, duration: 800 });
    </script>
</body>
</html>
