<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akadara</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    <link rel="stylesheet" href="styles.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <style>
        /* TETAP MEMAKSA FONT PLAYFAIR DISPLAY PILIHAN KELOMPOK LO */
        nav, .logo, .links a, .dropbtn, .nav-dropdown-content a, .dropdown .links a,
        .content h1, .typewriter, .content p, .btn button {
            font-family: 'Playfair Display', Georgia, serif !important;
        }

        /* Struktur Dropdown Laptop (Biar Gak Bug Samaan Kayak About Us) */
        .nav-dropdown-wrapper { 
            position: relative; 
            display: inline-block; 
        }
        .nav-dropdown-wrapper .dropbtn { 
            cursor: pointer; 
            display: inline-flex;
            align-items: center;
            color: white;
            text-decoration: none;
        }
        .nav-dropdown-wrapper .dropbtn i { 
            margin-left: 5px; 
            font-size: 0.8rem; 
            transition: transform 0.3s; 
        }
        .nav-dropdown-wrapper:hover .dropbtn i { 
            transform: rotate(180deg); 
        }
        .nav-dropdown-content {
            display: none; 
            position: absolute; 
            background-color: rgba(18, 18, 18, 0.98);
            backdrop-filter: blur(10px); 
            min-width: 200px; 
            top: 100%; 
            left: 50%;
            transform: translateX(-50%); 
            z-index: 999999; 
            border-radius: 6px; 
            border: 1px solid rgba(211, 3, 3, 0.4);
            box-shadow: 0px 8px 24px rgba(211, 3, 3, 0.4); 
            overflow: hidden;
            padding: 6px 0;
        }
        .nav-dropdown-content a {
            color: white !important; 
            padding: 12px 20px !important; 
            text-decoration: none !important;
            display: flex !important; 
            align-items: center !important; 
            gap: 10px !important; 
            font-size: 0.95rem !important;
            font-weight: normal !important;
            transition: background 0.2s ease !important;
        }
        .nav-dropdown-content a:hover { 
            background-color: rgb(171, 0, 0) !important; 
        }
        .nav-dropdown-wrapper:hover .nav-dropdown-content { 
            display: block; 
        }

        /* =======================================================
           PENGATUR UKURAN CANVA (PPT) SEDANG & AUTO RATA TENGAH
           ======================================================= */
        .iframe-section {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px 40px 20px; /* Memberi ruang space atas dan bawah */
        }

        .iframe-container {
            width: 60%;            /* Ukuran sedang pas di mata (sama dengan contact) */
            max-width: 800px;      /* Batas maksimal lebar monitor laptop */
            height: 450px;         /* Tinggi proporsional rasio presentasi 16:9 */
            position: relative;
            box-shadow: 0 0 25px rgba(211, 3, 3, 0.3); /* Efek glow merah mewah */
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Aturan Responsif Khusus Layar HP */
        @media screen and (max-width: 768px) {
            .iframe-container {
                width: 90%;        /* Melebar otomatis di smartphone */
                height: 260px;     /* Tinggi proporsional untuk layar HP */
            }
        }
    </style>
</head>
<body> 

    <nav>
        <div class="nav-container">
            <div class="logo">Akadara</div>
            
            <div class="links desktop-menu">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Design Product</a>
                
                <div class="nav-dropdown-wrapper">
                    <a class="dropbtn">Product <i class="fa-solid fa-caret-down"></i></a>
                    <div class="nav-dropdown-content">
                        <a href="skill.html">Produk Akhir</a>
                        <a href="info-ptn.html">Game Scratch</a>
                    </div>
                </div>
            </div>

            <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
        </div>

        <div class="dropdown">
            <div class="links">
                <i class="fa-solid fa-xmark cancel" onclick="cancelMenu()"></i> 
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Design Product</a> 
                <a href="skill.html">Produk Akhir</a>
                <a href="info-ptn.html">Game Scratch</a>
            </div>
        </div>
    </nav>

    <div class="iframe-section" data-aos="fade-up">
        <div class="iframe-container">
            <iframe src="https://www.canva.com/design/DAHGZL7VMkY/jxAW3_ymxUhWVtInttLA6g/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ offset: 0, duration: 800 });
    </script>
</body>
</html>
