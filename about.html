<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - Akadara</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <style>
        h1, h2, h3, .logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
        }

        /* --- PERBAIKAN STRUKTUR DROPDOWN UTAMA --- */
        .nav-dropdown-wrapper { 
            position: relative; 
            display: inline-block;
        }
        
        .nav-dropdown-wrapper .dropbtn { 
            cursor: pointer;
            padding: 15px 10px; /* Memperluas area sensitif kursor */
            display: inline-flex;
            align-items: center;
        }
        
        .nav-dropdown-wrapper .dropbtn i { 
            margin-left: 6px; 
            font-size: 0.8rem; 
            transition: transform 0.3s; 
        }
        
        /* Efek panah berputar saat di-hover */
        .nav-dropdown-wrapper:hover .dropbtn i { 
            transform: rotate(180deg); 
        }

        /* Kotak Dropdown Menu */
        .nav-dropdown-content {
            display: none !important; 
            position: absolute; 
            background-color: rgba(18, 18, 18, 0.98) !important; /* Latar gelap pekat agar tulisan terbaca */
            backdrop-filter: blur(10px); 
            min-width: 200px; 
            top: 100%; 
            left: 50%;
            transform: translateX(-50%); 
            z-index: 999999 !important; /* Tingkat layer tertinggi agar tidak tertimpa apapun */
            border-radius: 6px; 
            border: 1px solid rgba(211, 3, 3, 0.5);
            box-shadow: 0px 8px 24px rgba(211, 3, 3, 0.4); 
            overflow: hidden;
            padding: 6px 0;
        }

        /* Link di dalam Dropdown (Skill Product & Info PTN) */
        .nav-dropdown-content a {
            color: #ffffff !important; 
            padding: 12px 20px !important; 
            text-decoration: none !important;
            display: flex !important; 
            align-items: center !important; 
            gap: 12px; 
            font-size: 0.95rem !important;
            border-bottom: none !important; 
            font-weight: 500 !important;
            pointer-events: auto !important; /* Memaksa elemen agar bisa menerima klik mouse */
            transition: background 0.2s ease-in-out !important;
        }

        /* Efek saat menu di dalam dropdown disorot */
        .nav-dropdown-content a:hover { 
            background-color: rgb(211, 3, 3) !important; 
            color: #ffffff !important;
        }
        
        /* Memunculkan dropdown secara paksa hanya dengan CSS Hover */
        .nav-dropdown-wrapper:hover .nav-dropdown-content { 
            display: block !important; 
        }

        /* --- KONTEN PPT CANVA --- */
        .canva-holder {
            max-width: 850px; 
            width: 100%;
            margin: 0 auto;
        }

        .canva-wrapper {
            position: relative; 
            width: 100%; 
            height: 0; 
            padding-top: 56.2500%; 
            box-shadow: 0 8px 32px rgba(211, 3, 3, 0.2); 
            overflow: hidden;
            border-radius: 12px; 
            border: 1px solid rgba(211, 3, 3, 0.4);
            will-change: transform;
        }
    </style>
</head>
<body>
